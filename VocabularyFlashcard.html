<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary Flashcards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
  </style>
</head>
<body class="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-6 font-sans">

  <!-- Back to Menu -->
  <div class="w-full max-w-2xl mb-4">
    <a href="index.html" class="inline-flex items-center gap-1 text-slate-500 hover:text-indigo-600 transition-colors text-sm font-medium">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Menu
    </a>
  </div>

  <!-- Header Info -->
  <div class="w-full max-w-2xl flex justify-between items-end mb-6 text-slate-600">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Science Vocabulary</h1>
      <p class="text-sm mt-1">Click the card or use Spacebar to flip.</p>
    </div>
    <div id="card-counter" class="text-lg font-medium bg-white px-4 py-1 rounded-full shadow-sm border border-slate-200">
      1 / 0
    </div>
  </div>

  <!-- Flashcard -->
  <div id="flashcard" class="w-full max-w-2xl aspect-[3/2] sm:aspect-[2/1] perspective-1000 cursor-pointer">
    <div id="card-inner" class="relative w-full h-full duration-500 transform-style-3d">

      <!-- Front of Card (Word) -->
      <div class="absolute inset-0 w-full h-full backface-hidden bg-white rounded-2xl shadow-lg border border-slate-200 flex items-center justify-center p-8">
        <h2 id="card-word" class="text-4xl sm:text-5xl md:text-6xl font-extrabold text-indigo-600 text-center select-none">
          Word
        </h2>
      </div>

      <!-- Back of Card (Definition) -->
      <div class="absolute inset-0 w-full h-full backface-hidden bg-indigo-600 rounded-2xl shadow-lg border border-indigo-700 flex items-center justify-center p-8 rotate-y-180">
        <p id="card-definition" class="text-2xl sm:text-3xl text-white font-medium text-center leading-relaxed select-none">
          Definition
        </p>
      </div>

    </div>
  </div>

  <!-- Controls -->
  <div class="w-full max-w-2xl mt-8 flex justify-between items-center gap-4">
    <div class="flex gap-2">
      <button id="btn-shuffle" class="p-3 bg-white text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl shadow-sm border border-slate-200 transition-colors flex items-center gap-2" title="Shuffle Cards">
        <i data-lucide="shuffle" class="w-5 h-5"></i>
        <span class="hidden sm:inline font-medium">Shuffle</span>
      </button>
      <button id="btn-reset" class="p-3 bg-white text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl shadow-sm border border-slate-200 transition-colors flex items-center gap-2" title="Reset to Original Order">
        <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
      </button>
    </div>

    <div class="flex gap-4">
      <button id="btn-prev" class="px-6 py-3 bg-white text-indigo-600 rounded-xl shadow-sm border border-slate-200 hover:bg-indigo-50 transition-colors flex items-center gap-2 font-bold">
        <i data-lucide="arrow-left" class="w-6 h-6"></i>
        <span class="hidden sm:inline">Prev</span>
      </button>
      <button id="btn-next" class="px-6 py-3 bg-indigo-600 text-white rounded-xl shadow-sm hover:bg-indigo-700 transition-colors flex items-center gap-2 font-bold">
        <span class="hidden sm:inline">Next</span>
        <i data-lucide="arrow-right" class="w-6 h-6"></i>
      </button>
    </div>
  </div>

  <script>
    const initialVocabulary = [
      { "word": "Application", "definition": "how the experiment relates to the real world" },
      { "word": "Analyze", "definition": "to evaluate in detail in order to support valid decision making" },
      { "word": "Bar Graph", "definition": "data organized on a grid in the form of bars" },
      { "word": "Chart", "definition": "a graphic representation of measurements taken of the dependent variable" },
      { "word": "Conclusion", "definition": "the outcome of the experiment based on the data collected" },
      { "word": "Control group", "definition": "the group in the investigation that that remains unchanged" },
      { "word": "Controlled variable", "definition": "things that are held constant during an experiment" },
      { "word": "Data", "definition": "set of collected and recorded measurements or observations" },
      { "word": "Experiment", "definition": "an investigation carried out under controlled conditions" },
      { "word": "Fact", "definition": "a truth about a subject matter that can be supported by evidence" },
      { "word": "Field Studies", "definition": "method of investigation for studying plants and animals in their habitat" },
      { "word": "Hypothesis", "definition": "a predicted outcome to an experiment based on the research collected" },
      { "word": "Inference", "definition": "an explanation based on evidence that is not directly observed" },
      { "word": "Investigation", "definition": "a scientific study of the natural world using the scientific method" },
      { "word": "Interpretation", "definition": "an explanation of the data collected in an experiment or observation" },
      { "word": "Journal", "definition": "a detailed record of data collections including the date and time" },
      { "word": "Line Graph", "definition": "data organized on a grid in the form of lines" },
      { "word": "Materials list", "definition": "a detailed list of the supplies and equipment used in an investigation" },
      { "word": "Measurement", "definition": "the process of determining the size, length, or quantity of something" },
      { "word": "Metric System", "definition": "National System of Measurement (i.e., meter, liter, gram, etc.)" },
      { "word": "Models", "definition": "a representation of some object or event in the real world" },
      { "word": "Observation", "definition": "information gathered through the senses about the natural world" },
      { "word": "Opinion", "definition": "a personal belief or judgment that is not based on proof or certainty" },
      { "word": "Outcome variable", "definition": "the factor that is being measured in the experiment" },
      { "word": "Prediction", "definition": "guessing the outcome of an experiment before testing begins" },
      { "word": "Procedure", "definition": "a detailed description listing all of the steps in an experiment" },
      { "word": "Problem", "definition": "the question being investigated in an experiment" },
      { "word": "Reference materials", "definition": "sources of information about the problem being investigated" },
      { "word": "Reliable", "definition": "a term used to describe the certainty of data or results of an experiment" },
      { "word": "Replicable", "definition": "the ability of a scientific investigation to be reproduced by another" },
      { "word": "Research", "definition": "a search for general knowledge about a specific topic" },
      { "word": "Results", "definition": "a statement that interprets the data" },
      { "word": "Scientific Method", "definition": "routine used to guide a science investigation from beginning to end" },
      { "word": "Simulation", "definition": "an imitation of the functioning of a system or process" },
      { "word": "Survey", "definition": "questioning a large group of random people about their attitudes or beliefs" },
      { "word": "Technology", "definition": "the use of scientific knowledge and processes to solve practical problems" },
      { "word": "Testable", "definition": "a question that can be answered through experimenting" },
      { "word": "Test variable", "definition": "the part of the experiment that is changed on purpose to test its effects" },
      { "word": "Trials", "definition": "a repeat of an experiment with a new collection of data or observations" },
      { "word": "Valid", "definition": "having adequate data or observations to support the conclusion" },
      { "word": "Asteroid", "definition": "an object much smaller than a planet that orbits the Sun" },
      { "word": "Axis", "definition": "an imaginary line around which a body rotates" },
      { "word": "Cleavage", "definition": "a property used to describe the surfaces of minerals as they break apart" },
      { "word": "Climate", "definition": "the pattern of weather that occurs in a certain location over many years" },
      { "word": "Condensation", "definition": "the process by which water is changed from a gas to a liquid" },
      { "word": "Comet", "definition": "object made of rock, ice, dust, and gas that revolves around the Sun" },
      { "word": "Erosion", "definition": "the process of moving weathered rock from one place to another" },
      { "word": "Evaporation", "definition": "the process by which water is changed from a liquid to a gas" },
      { "word": "Fossil Fuels", "definition": "nonrenewable resources like coal, oil, and natural gas" },
      { "word": "Galaxy", "definition": "a large system of stars, gas, and dust held together by gravity" },
      { "word": "Gravity", "definition": "the force of attraction that pulls bodies towards the center of the Earth" },
      { "word": "Hemisphere", "definition": "one half of Earth" },
      { "word": "Humidity", "definition": "a measure of the amount of water vapor in the air" },
      { "word": "Igneous rock", "definition": "rock formed from the cooling of magma or lava" },
      { "word": "Inner Planets", "definition": "the small, rocky planets having a few moons" },
      { "word": "Light Years", "definition": "a unit of measure used to describe the distance in space" },
      { "word": "Luster", "definition": "a property describing a mineral's appearance when it reflects light" },
      { "word": "Metamorphic rock", "definition": "rock formed from extreme heat and pressure" },
      { "word": "Mineral", "definition": "a solid material with its own properties, formed in or on the Earth's crust" },
      { "word": "Moon", "definition": "a natural object that orbits a planet" },
      { "word": "Outer Planets", "definition": "the large, gaseous planets with multiple moon and ring systems" },
      { "word": "Polar zone", "definition": "a climate zone with very little precipitation and extremely cold temperatures" },
      { "word": "Precipitation", "definition": "a form of water that falls to the Earth as rain, snow, sleet, or hail" },
      { "word": "Revolution", "definition": "the motion of one object around another object" },
      { "word": "Rotation", "definition": "the spinning of an object on its axis" },
      { "word": "Seasons", "definition": "a division of the year into four periods marked by changes in the weather" },
      { "word": "Sedimentary rock", "definition": "a type of rock formed from layers of sediment" },
      { "word": "Soil", "definition": "the top layer of Earth's surface made of weathered rock and organic matter" },
      { "word": "Solar system", "definition": "the Sun, planets, and objects that orbit the Sun" },
      { "word": "Star", "definition": "a mass of hot gases that produces its own light energy" },
      { "word": "Streak", "definition": "the color of the powder of a mineral when it is rubbed on a streak plate" },
      { "word": "Sun", "definition": "a medium-sized star at the center of our solar system" },
      { "word": "Temperate zone", "definition": "a climate zone characterized by moderate temperatures" },
      { "word": "Tropical zone", "definition": "a climate zone near the equator characterized by warm temperatures" },
      { "word": "Water cycle", "definition": "phase change of water as it moves through the environment" },
      { "word": "Water vapor", "definition": "the gas state of water" },
      { "word": "Weather", "definition": "the condition of the atmosphere at a given time and place" },
      { "word": "Weathering", "definition": "the breaking down of rocks and minerals by wind, rain, snow, etc." },
      { "word": "Absorb", "definition": "to take in and store energy without reflecting it" },
      { "word": "Attraction", "definition": "the magnetic force that pulls objects toward each other" },
      { "word": "Balance", "definition": "the instrument used to measure mass" },
      { "word": "Balanced forces", "definition": "forces that are equal in size yet, opposite in direction" },
      { "word": "Chemical change", "definition": "a change that alters the composition of a substance altogether" },
      { "word": "Conduct", "definition": "to transmit heat or electricity through a medium" },
      { "word": "Compass", "definition": "an instrument used to measure direction" },
      { "word": "Dissolve", "definition": "two or more substances that are mixed together to form a solution" },
      { "word": "Filtration", "definition": "separating liquids from solids by passing the liquid through a filter" },
      { "word": "Force", "definition": "a push or a pull that one object exerts on another object" },
      { "word": "Friction", "definition": "a force involving direct contact that slows down motion" },
      { "word": "Gas", "definition": "state of matter that does not have definite volume or definite shape" },
      { "word": "Graduated cylinder", "definition": "an instrument used to measure volume" },
      { "word": "Grams", "definition": "the unit of measure for mass" },
      { "word": "Insulator", "definition": "a material used to reduce the transfer of electricity, heat, or sound" },
      { "word": "Invertebrate", "definition": "an animal without a backbone" },
      { "word": "Liquid", "definition": "state of matter that has definite volume, but no definite shape" },
      { "word": "Magnetism", "definition": "force of attraction for iron and certain other metals" },
      { "word": "Matter", "definition": "anything that takes up space and has mass" },
      { "word": "Mass", "definition": "the amount of matter in an object" },
      { "word": "Mechanical energy", "definition": "the energy of motion or position" },
      { "word": "Metric system", "definition": "national system of measurement like meters, liters, and grams" },
      { "word": "Milliliter", "definition": "the unit of measure for volume" },
      { "word": "Mixture", "definition": "combining two or more substances" },
      { "word": "Physical change", "definition": "a change that affects the size, color, or shape of a substance" },
      { "word": "Pitch", "definition": "the relative frequency (high or low) of a sound as perceived by a listener" },
      { "word": "Reflect", "definition": "to bounce light, sound, or heat off of a surface" },
      { "word": "Repel", "definition": "to force away or apart from" },
      { "word": "Sieving", "definition": "separating fine particles from larger ones by sifting them through small holes" },
      { "word": "Solid", "definition": "state of matter that has definite shape and definite volume" },
      { "word": "Solution", "definition": "a mixture in which one or more substances are dissolved in another" },
      { "word": "Speed", "definition": "the distance traveled in a given amount of time" },
      { "word": "State of Matter", "definition": "form of matter including a solid, liquid, or a gas" },
      { "word": "Temperature", "definition": "the measure of heat energy in a substance" },
      { "word": "Texture", "definition": "a physical property of a solid used to describe its surface" },
      { "word": "Unbalanced forces", "definition": "forces that are unequal in size and may or may not be opposite in direction" },
      { "word": "Volume", "definition": "the amount of space an object takes up" },
      { "word": "Water displacement", "definition": "a measure of the volume of an irregularly shaped object" },
      { "word": "Weight", "definition": "the measure of the force of gravity on an object" },
      { "word": "Adaptation", "definition": "traits that help an organism survive" },
      { "word": "Behavior", "definition": "a plant or animal reaction that occurs in response to stimuli" },
      { "word": "Carnivore", "definition": "meat-eating animal" },
      { "word": "Characteristic", "definition": "a quality or trait of an object or organism" },
      { "word": "Classify", "definition": "to group by category based on similarities" },
      { "word": "Community", "definition": "populations of different organisms living together in the same area" },
      { "word": "Complete metamorphosis", "definition": "life cycle of insects that includes a larval stage" },
      { "word": "Consumer", "definition": "an organism that feeds on other plants or animals for food" },
      { "word": "Ecosystem", "definition": "living and nonliving things that interact in an environment" },
      { "word": "Endangered species", "definition": "a population of organisms with the risk of becoming extinct" },
      { "word": "Endoskeleton", "definition": "an internal support structure of an animal" },
      { "word": "Environment", "definition": "conditions in which an organism lives" },
      { "word": "Exoskeleton", "definition": "a hard outer structure, such as the shell of an insect or crustacean" },
      { "word": "Extinct species", "definition": "a species that no longer exists" },
      { "word": "Fertilization", "definition": "the process by which the female and male reproductive cells unite" },
      { "word": "Food chain", "definition": "the transfer of energy from the Sun through producers and consumers" },
      { "word": "Germination", "definition": "the process by which a plant goes from a seed or a spore" },
      { "word": "Herbivore", "definition": "plant-eating animal" },
      { "word": "Incomplete metamorphosis", "definition": "type of insect development that involves only three stages" },
      { "word": "Inherited trait", "definition": "characteristics that are passed from parents to their offspring" },
      { "word": "Larva", "definition": "the eating and growing stage in the life cycle of an organism" },
      { "word": "Life cycle", "definition": "the stages of an organism's growth and development" },
      { "word": "Nymph", "definition": "an insect undergoing incomplete metamorphosis" },
      { "word": "Omnivore", "definition": "animals that eat both meat and plants" },
      { "word": "Ovary", "definition": "the female reproductive organ that produces and contains egg cells" },
      { "word": "Pistil", "definition": "the female reproductive structure of a flowering plant" },
      { "word": "Population", "definition": "type of species living in a specific area" },
      { "word": "Predator", "definition": "animals that hunt and consume other animals" },
      { "word": "Prey", "definition": "organism that is hunted for food by another organism" },
      { "word": "Producer", "definition": "an organism that makes its own food" },
      { "word": "Pupa", "definition": "a stage in the life cycle of an insect that occurs between larva and adult" },
      { "word": "Pollen", "definition": "the fine dust-like powder that contains the male reproductive cells" },
      { "word": "Pollinate", "definition": "transfer of pollen from the male to the female reproductive structure" },
      { "word": "Reproduction", "definition": "the process of making more organisms of the same kind" },
      { "word": "Species", "definition": "a group of the same kind of organisms" },
      { "word": "Spore", "definition": "a seed-like structure that produces a new plant like a fern or moss" },
      { "word": "Stamen", "definition": "the male reproductive structure of a flowering plant" },
      { "word": "Vertebrate", "definition": "animals that have a backbone" }
    ];

    let cards = [...initialVocabulary];
    let currentIndex = 0;
    let isFlipped = false;

    // DOM Elements
    const cardInner = document.getElementById('card-inner');
    const wordEl = document.getElementById('card-word');
    const defEl = document.getElementById('card-definition');
    const counterEl = document.getElementById('card-counter');

    function renderContent() {
      wordEl.textContent = cards[currentIndex].word;
      defEl.textContent = cards[currentIndex].definition;
      counterEl.textContent = `${currentIndex + 1} / ${cards.length}`;
    }

    function renderFlipState() {
      if (isFlipped) {
        cardInner.classList.add('rotate-y-180');
      } else {
        cardInner.classList.remove('rotate-y-180');
      }
    }

    function handleFlip() {
      isFlipped = !isFlipped;
      renderFlipState();
    }

    function handleNext() {
      isFlipped = false;
      renderFlipState();
      setTimeout(() => {
        currentIndex = (currentIndex + 1) % cards.length;
        renderContent();
      }, 150);
    }

    function handlePrev() {
      isFlipped = false;
      renderFlipState();
      setTimeout(() => {
        currentIndex = (currentIndex - 1 + cards.length) % cards.length;
        renderContent();
      }, 150);
    }

    function handleShuffle() {
      isFlipped = false;
      renderFlipState();
      setTimeout(() => {
        cards = [...cards].sort(() => Math.random() - 0.5);
        currentIndex = 0;
        renderContent();
      }, 150);
    }

    function handleReset() {
      isFlipped = false;
      renderFlipState();
      setTimeout(() => {
        cards = [...initialVocabulary];
        currentIndex = 0;
        renderContent();
      }, 150);
    }

    // Event Listeners
    document.getElementById('flashcard').addEventListener('click', handleFlip);
    document.getElementById('btn-next').addEventListener('click', handleNext);
    document.getElementById('btn-prev').addEventListener('click', handlePrev);
    document.getElementById('btn-shuffle').addEventListener('click', handleShuffle);
    document.getElementById('btn-reset').addEventListener('click', handleReset);

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') handleNext();
      if (e.key === 'ArrowLeft') handlePrev();
      if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        e.preventDefault();
        handleFlip();
      }
    });

    // Initialization
    lucide.createIcons();
    renderContent();
    renderFlipState();
  </script>
</body>
</html>
